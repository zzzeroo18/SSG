<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGG - Iniciar Sesión</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <button id="theme-toggle" aria-label="Cambiar tema de color">Luna / Sol</button>
    </header>

    <main class="login-container">
        <h1>Sistema de Gestión de Gastos (SGG)</h1>
        
        <form id="login-form">
            <div class="form-group">
                <label for="username">Usuario:</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>

            <button type="submit" id="btn-submit">Ingresar</button>
        </form>
            <div id="message-box" role="alert" aria-live="assertive"></div>
    </main>

    <script src="login.js"></script>
</body>
</html>
